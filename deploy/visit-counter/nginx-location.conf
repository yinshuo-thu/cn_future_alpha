# Add inside the `server { server_name autoalpha.cn; ... }` block in
# /etc/nginx/sites-available/autoalpha.cn, right after the
# `location /cn_future_alpha/ { ... }` static-alias block.
# This more-specific prefix wins over the static alias for the /visits path.

location /cn_future_alpha/visits {
    proxy_pass http://127.0.0.1:8766;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    default_type application/json;
}
